  <link rel="stylesheet" href="CSS/estilo.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

  <div class="container">
    <a class="navbar-brand" href="index.html">
      <i class="bi bi-house-door-fill"></i>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

<!-- FORMULÁRIO -->
<div class="container mt-4 mb-4">
  <h2 class="text-center mb-4">Cadastro de Produto</h2>

  <form>
    
    <!-- Nome -->
    <div class="mb-3">
      <label class="form-label">Nome do produto</label>
      <input type="text" class="form-control" placeholder="Digite o nome" required>
    </div>

    <!-- Valor -->
    <div class="mb-3">
      <label class="form-label">Valor</label>
      <input type="number" class="form-control" step="0.5" placeholder="Ex: 10.5" required>
    </div>

    <!-- Quantidade -->
    <div class="mb-3">
      <label class="form-label">Quantidade</label>
      <input type="number" class="form-control" placeholder="Ex: 5" required>
    </div>

    <!-- Categoria -->
    <div class="mb-3">
      <label class="form-label">Categoria</label>
      <select class="form-select" required>
        <option selected disabled>Selecione...</option>
        <option>Eletrônicos</option>
        <option>Roupas</option>
        <option>Alimentos</option>
        <option>Outros</option>
      </select>
    </div>

    <!-- Fabricado em -->
    <div class="mb-3">
      <label class="form-label d-block">Fabricado em:</label>

      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="estado" value="sp">
        <label class="form-check-label">SP</label>
      </div>

      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="estado" value="rj">
        <label class="form-check-label">RJ</label>
      </div>

      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="estado" value="mg">
        <label class="form-check-label">MG</label>
      </div>
    </div>

    <!-- Botão -->
    <div class="text-center">
      <button type="submit" class="btn btn-primary">
        <i class="bi bi-send"></i> Cadastrar
      </button>
    </div>

  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
